# Baseline OWASP-aligned headers for Karma Guard static hosts.
#
# CORS: do not set Access-Control-Allow-Origin: * on authenticated JSON APIs.
# Prefer same-origin reverse proxy; if you must allow another origin, use an
# explicit `map` to echo only trusted Origin values (never reflect arbitrary
# $http_origin). See also studio CSP `connect-src 'self'` in index.html.
#
# Apply after TLS. Split hosts (www vs app) and attach CSP from:
#   - agent-guard-csp-portal.conf
#   - agent-guard-csp-studio.conf
#   - agent-guard-csp-wallet.conf
#
# Recommended production split: brochure on `www.`, WalletConnect sign-in + Studio on `app.` (or path-based locations with distinct `add_header` blocks).

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Do not add Cross-Origin-Opener-Policy on the WalletConnect page without staging tests (some flows use popups / wallet tabs).
# Enable HSTS only on real HTTPS deployments (max-age tune to your policy).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Optional CSP Report-Only (wallet page) — see agent-guard-csp-wallet.conf
# add_header Content-Security-Policy-Report-Only "..." always;
