# Include inside `server { }` or `location /apps/agent-service-guard/frontend/ { }` after TLS is configured.
# Adjust paths if you mount the app at domain root.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Enable HSTS only on real HTTPS deployments (max-age tune to your policy).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Optional: Content-Security-Policy-Report-Only — uncomment after validating WalletConnect / esm.sh in staging.
# add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests; block-all-mixed-content; script-src 'self' https://esm.sh https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://esm.sh https://cdnjs.cloudflare.com https://fonts.googleapis.com https://*.walletconnect.com wss://*.walletconnect.com https://*.walletconnect.org wss://*.walletconnect.org https://registry.walletconnect.com https://rpc.walletconnect.org https://pulse.walletconnect.org;" always;
