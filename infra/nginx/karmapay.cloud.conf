server {
    listen 80;
    listen [::]:80;
    server_name karmapay.cloud www.karmapay.cloud app.karmapay.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name karmapay.cloud www.karmapay.cloud;

    # Replace with your real cert paths (certbot or provider-issued certs).
    ssl_certificate     /etc/letsencrypt/live/karmapay.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/karmapay.cloud/privkey.pem;

    root /var/www/karmapay-site;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.karmapay.cloud;

    ssl_certificate     /etc/letsencrypt/live/karmapay.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/karmapay.cloud/privkey.pem;

    root /var/www/karmapay-app;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: reverse proxy for API under the same app domain
    location /api/ {
        proxy_pass http://127.0.0.1:8811/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
