# Example: rate-limit proxied Agent Guard / Karma Pay API (nginx).
# Tune zone size and rate to your traffic profile. Apply inside `location` that
# proxies to the upstream JSON API (not static HTML).
#
# http {
#   limit_req_zone $binary_remote_addr zone=karma_api:10m rate=20r/s;
# }
#
# server {
#   location /api/ {
#     limit_req zone=karma_api burst=40 nodelay;
#     limit_req_status 429;
#     proxy_pass http://127.0.0.1:8080/;
#   }
# }
