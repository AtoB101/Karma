# Content-Security-Policy for marketing portal only (`index.html`, `landing.js`, fonts, FA).
# Mirrors the meta tag in index.html — keep them in sync when changing script CDNs.
#
# add_header Content-Security-Policy "default-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; script-src 'self'; connect-src 'none'; manifest-src 'self'; upgrade-insecure-requests" always;
