<!doctype html><html><head><meta charset='utf-8'><title>Trust-Chain Console Dashboard</title><link rel='stylesheet' href='./ui-assets/style.css'><script src='./ui-assets/app.js'></script></head><body><header><h2>Trust-Chain 控制台</h2><nav><a href='/index.html'>Dashboard</a><a href='/agent/confirm-call/'>调用确认</a></nav></header><main><div class='card'><div class='section-title'><h3>首页 Dashboard</h3><div class='summary-line'><span class='badge' id='topWallet'></span><span class='badge' id='topBalance'></span><span class='badge' id='topIncome'></span><span class='badge' id='topExpense'></span><span class='badge' id='topAllowance'></span></div></div><p><button id='buyerOneClick' class='primary'>买方一键授权</button> <button id='sellerOneClick' class='primary'>卖方一键部署</button> <button id='resetDemo'>重置数据</button> <button id='startDemoScript'>演示脚本</button></p></div><div class='layout'><aside class='card side-nav'><button class='nav-btn primary' onclick="document.getElementById('sec-income').scrollIntoView({behavior:'smooth'})">1. 收款区</button><button class='nav-btn primary' onclick="document.getElementById('sec-expense').scrollIntoView({behavior:'smooth'})">2. 付款区</button><button class='nav-btn primary' onclick="document.getElementById('sec-bills').scrollIntoView({behavior:'smooth'})">3. 账单记录</button><button class='nav-btn primary' onclick="document.getElementById('sec-settings').scrollIntoView({behavior:'smooth'})">4. 设置</button></aside><section><div id='sec-income' class='card content-section'><h3>收款区：我的收费 Agent</h3><p><button id='toggleAddAgent' class='primary'>+ 添加收费 Agent</button></p><div id='addAgentForm' style='display:none'><div class='grid'><div><label>Agent 名称</label><input id='fName'></div><div><label>Agent 描述</label><input id='fDesc'></div><div><label>服务类型</label><input id='fType' placeholder='数据查询/风险检测'></div><div><label>API / 工具地址</label><input id='fEndpoint'></div><div><label>单次价格</label><input id='fPrice' type='number' step='0.001'></div><div><label>收款币种</label><select id='fToken'><option>USDC</option><option>USDT</option></select></div><div><label>收款钱包</label><input id='fWallet'></div><div><label>成功才收费</label><select id='fSuccess'><option value='true'>是</option><option value='false'>否</option></select></div><div><label>支持退款</label><select id='fRefund'><option value='true'>是</option><option value='false'>否</option></select></div><div><label>人工确认</label><select id='fManual'><option value='false'>否</option><option value='true'>是</option></select></div></div><p><button id='createAgent' class='primary'>创建 Agent</button></p></div><div id='agentCards'></div></div><div id='sec-expense' class='card content-section'><h3>付款区：我的付款账单与授权</h3><div class='grid'><div class='kpi'><div class='label'>授权币种</div><div class='value' id='authToken'></div></div><div class='kpi'><div class='label'>授权额度</div><div class='value' id='authAllowance'></div></div><div class='kpi'><div class='label'>可用额度</div><div class='value' id='authActive'></div></div><div class='kpi'><div class='label'>已占用额度</div><div class='value' id='authLocked'></div></div></div><p><button id='stopAuth'>停止授权</button> <button id='incAuth'>增加额度 +10</button></p></div><div id='sec-bills' class='card content-section'><h3>账单记录：待确认 / 待结算 / 已付款 / 争议中</h3><div id='billGroups'></div></div><div id='sec-settings' class='card content-section'><h3>设置</h3><p class='muted'>当前聚焦四件事：收款、付款、账单、授权。不引入复杂市场/社交/图表。</p></div></section></div></main><script>
document.getElementById('startDemoScript').onclick=()=>window.tcUI.startDemoScript();
document.getElementById('resetDemo').onclick=()=>{window.tcUI.resetDemoState();render();};
document.getElementById('buyerOneClick').onclick=()=>{window.tcUI.ensureBuyerOneClickAuthorization();render();};
document.getElementById('sellerOneClick').onclick=()=>{window.tcUI.ensureSellerOneClickDeploy();render();};
document.getElementById('toggleAddAgent').onclick=()=>{addAgentForm.style.display=addAgentForm.style.display==='none'?'block':'none';};
document.getElementById('createAgent').onclick=()=>{if(!fName.value.trim()){alert('请填写 Agent 名称');return;}window.tcUI.addMyAgent({name:fName.value,description:fDesc.value,serviceType:fType.value,endpoint:fEndpoint.value,price:Number(fPrice.value||0),token:fToken.value,wallet:fWallet.value,successOnly:fSuccess.value==='true',refundable:fRefund.value==='true',manualConfirm:fManual.value==='true'});render();};
document.getElementById('stopAuth').onclick=()=>{window.tcUI.stopBuyerAuthorization();render();};
document.getElementById('incAuth').onclick=()=>{window.tcUI.increaseBuyerAllowance(10);render();};
function agentDeployLinks(a){const key=encodeURIComponent(a.id);return {charge:`https://trustchain.local/pay/${key}`,entry:`https://trustchain.local/call/${key}`,code:`trustchain.wrapTool({ endpoint: \"${a.endpoint}\", price: \"${a.price}\", token: \"${a.token}\" })`};}
function copyText(text){navigator.clipboard?.writeText(text);alert('已复制');}
function pauseAgent(id){window.tcUI.updateMyAgent(id,{status:'paused'});render();}
function resumeAgent(id){window.tcUI.updateMyAgent(id,{status:'running'});render();}
function deleteAgent(id){window.tcUI.removeMyAgent(id);render();}
function editAgentPrice(id){const v=prompt('输入新价格');if(v===null)return;window.tcUI.updateMyAgent(id,{price:Number(v||0)});render();}
function billAction(id,action){if(action==='confirm')window.tcUI.updateBillStatus(id,'PendingSettle');if(action==='reject')window.tcUI.updateBillStatus(id,'Disputed');if(action==='pay')window.tcUI.updateBillStatus(id,'Paid');if(action==='dispute')window.tcUI.updateBillStatus(id,'Disputed');render();}
function setBillStrategy(id,val){window.tcUI.updateBillStrategy(id,val);render();}
function renderBillsByGroup(list,title){return `<div class='bill-group'><h4>${title}</h4>${list.map(b=>`<div class='bill-card'><div><strong>${b.service}</strong> <span class='tiny'>${b.id}</span></div><div class='muted'>收款方 Agent: ${b.seller} | 调用方 Agent: ${b.callerAgent}</div><div class='muted'>金额: ${window.tcUI.fmt(b.amount,s.buyer.token)} | 状态: ${b.status} | 时间: ${b.createdAt}</div><div style='margin-top:8px'><button onclick="billAction('${b.id}','confirm')" ${b.status!=='PendingConfirm'?'disabled':''}>确认付款</button> <button onclick="billAction('${b.id}','reject')" ${b.status!=='PendingConfirm'?'disabled':''}>拒绝</button> <button onclick="billAction('${b.id}','pay')" ${b.status!=='PendingSettle'?'disabled':''}>结算付款</button> <button onclick="billAction('${b.id}','dispute')" ${b.status==='Paid'?'':'disabled'}>发起争议</button> <button onclick="alert('服务结果：Demo Result for ${b.service}')">查看结果</button> <button onclick="alert('链上记录：tx_demo_${b.id}')">查看链上记录</button> <select onchange="setBillStrategy('${b.id}',this.value)"><option value='now' ${b.payStrategy==='now'?'selected':''}>立即付</option><option value='batch' ${b.payStrategy==='batch'?'selected':''}>累计后付</option></select></div></div>`).join('') || "<p class='muted'>暂无</p>"}</div>`;}
let s;
function render(){s=window.tcUI.getState();const income=(s.myAgents||[]).reduce((a,b)=>a+Number(b.totalIncome||0),0);const expense=(s.bills||[]).filter(x=>x.status==='Paid').reduce((a,b)=>a+Number(b.amount||0),0);topWallet.textContent=`钱包: ${s.buyer.wallet}`;topBalance.textContent=`余额: ${window.tcUI.fmt(s.buyer.walletBalance,s.buyer.token)}`;topIncome.textContent=`总收入: ${window.tcUI.fmt(income,s.buyer.token)}`;topExpense.textContent=`总支出: ${window.tcUI.fmt(expense,s.buyer.token)}`;topAllowance.textContent=`可用授权: ${window.tcUI.fmt(s.buyer.active,s.buyer.token)}`;authToken.textContent=s.buyer.token+(s.buyer.stopped?'（已停止）':'');authAllowance.textContent=window.tcUI.fmt(s.buyer.allowance,s.buyer.token);authActive.textContent=window.tcUI.fmt(s.buyer.active,s.buyer.token);authLocked.textContent=window.tcUI.fmt(s.buyer.locked+s.buyer.reserved,s.buyer.token);agentCards.innerHTML=(s.myAgents||[]).map(a=>{const links=agentDeployLinks(a);return `<div class='agent-card'><div class='section-title'><strong>${a.name}</strong><span class='badge'>${a.status==='running'?'运行中':'暂停'}</span></div><div class='muted'>${a.description}</div><div class='tiny'>类型: ${a.serviceType} | 接口: ${a.endpoint}</div><div class='summary-line'><span class='badge'>单次价格: ${window.tcUI.fmt(a.price,a.token)}</span><span class='badge'>今日调用: ${a.todayCalls}</span><span class='badge'>今日收入: ${window.tcUI.fmt(a.todayIncome,a.token)}</span><span class='badge'>总收入: ${window.tcUI.fmt(a.totalIncome,a.token)}</span></div><div class='agent-actions'><button onclick="editAgentPrice('${a.id}')">编辑</button><button onclick="${a.status==='running'?'pauseAgent':'resumeAgent'}('${a.id}')">${a.status==='running'?'暂停收费':'恢复运行'}</button><button onclick="deleteAgent('${a.id}')">删除</button><button onclick="copyText('${links.charge}')">复制收费链接</button><button onclick="copyText('${links.code}')">复制接入代码</button><button onclick="copyText('${links.entry}')">复制调用入口</button></div></div>`;}).join('')||"<p class='muted'>暂无收费 Agent</p>";const pendingConfirm=(s.bills||[]).filter(b=>b.status==='PendingConfirm');const pendingSettle=(s.bills||[]).filter(b=>b.status==='PendingSettle');const paid=(s.bills||[]).filter(b=>b.status==='Paid');const disputed=(s.bills||[]).filter(b=>b.status==='Disputed');billGroups.innerHTML=renderBillsByGroup(pendingConfirm,'待确认')+renderBillsByGroup(pendingSettle,'待结算')+renderBillsByGroup(paid,'已付款')+renderBillsByGroup(disputed,'争议中');}
render();
</script></body></html>
