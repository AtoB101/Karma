[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "karma-sdk"
version = "1.0.0"
description = "Minimal Python client for KarmaBilateral — lock / bind / settle in three lines"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = ["web3>=6.0"]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio"]

[tool.setuptools.packages.find]
where = ["."]
include = ["karma_sdk*"]
