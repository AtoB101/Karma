[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "karma-solana"
version = "0.1.0"
description = "Karma Trust Protocol — Solana Integration SDK (Verifiable Execution, Evidence Bundles, x402 Payments)"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
keywords = ["karma", "solana", "verifiable-execution", "x402", "agentic-commerce", "evidence-bundle"]
authors = [
    { name = "Karma Trust Protocol", email = "dev@karma.xyz" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    # Solana core libraries
    "solders>=0.21.0",
    "solana>=0.34.0",
    "anchorpy>=0.18.0",

    # Cryptographic verification
    "cryptography>=42.0.0",
    "pynacl>=1.5.0",

    # Karma core (same repo, relative path — install from parent)
    "karma-trust-protocol>=0.1.0",

    # Decentralized storage
    "arweave-python-client>=0.1.0",
    "ipfshttpclient>=0.8.0",

    # HTTP / API
    "httpx>=0.27.0",
    "fastapi>=0.111.0",

    # Data validation
    "pydantic>=2.7.0",

    # Utilities
    "base58>=2.1.0",
    "base64io-python>=1.0.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "black>=24.4.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

[tool.setuptools.packages.find]
where = ["."]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
