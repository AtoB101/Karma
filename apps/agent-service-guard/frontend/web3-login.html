<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KarmaPay — Sign in</title>
  <meta name="description" content="Sign in with your wallet to open Agent Studio." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    :root{--bg:#07070d;--line:rgba(0,245,255,.34);--cyan:#00f5ff;--muted:#9ca3af;--text:#e5e7eb}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif}
    .nav{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
    .nav a{color:var(--muted);text-decoration:none;font-size:.88rem}
    .nav a:hover{color:var(--cyan)}
    main{max-width:440px;margin:0 auto;padding:32px 16px 48px;text-align:center}
    #qr-box{min-height:280px;display:flex;align-items:center;justify-content:center}
    #qr-box canvas,#qr-box img{max-width:100%}
    .timer{margin-top:12px;font-size:.88rem;color:var(--muted)}
    .mnemonic-wrap{margin-top:28px;text-align:left;border-top:1px solid rgba(255,255,255,.1);padding-top:20px}
    .mnemonic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    @media(max-width:480px){.mnemonic-grid{grid-template-columns:repeat(2,1fr)}}
    .mnemonic-grid input{font:inherit;padding:8px;border-radius:8px;border:1px solid #2f3d6e;background:#0d1328;color:#fff}
    .status{margin-top:14px;font-size:.85rem;color:var(--muted);min-height:1.2em}
    button{font:inherit;cursor:pointer;border-radius:10px;padding:10px 16px;border:1px solid var(--line);background:rgba(0,245,255,.1);color:var(--cyan);font-weight:600}
    button:hover{background:var(--cyan);color:#000}
    [hidden]{display:none!important}
  </style>
</head>
<body>
  <header class="nav">
    <strong>KARMA.PAY</strong>
    <nav style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <a href="./index.html">Home</a>
      <a href="./studio/index.html">Studio</a>
    </nav>
  </header>

  <main>
    <div id="qr-box"></div>
    <p class="timer" id="timer-line"></p>
    <p class="status" id="status-line"></p>

    <div class="mnemonic-wrap">
      <button type="button" id="mnemonic-toggle">Mnemonic login</button>
      <div id="mnemonic-panel" hidden>
        <p class="status" style="margin-bottom:10px">Use only on a device you trust.</p>
        <div class="mnemonic-grid" id="word-grid"></div>
        <button type="button" id="mnemonic-submit" style="margin-top:14px;width:100%">Continue</button>
      </div>
    </div>
  </main>

  <script src="wc-config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous"></script>
  <script type="module">
    import SignClient from "https://esm.sh/@walletconnect/sign-client@2.17.1";
    import { ethers } from "https://esm.sh/ethers@6.13.4";

    const REQUIRED_CHAIN = "eip155:1";
    const L = {
      qrExpires: "QR refreshes in",
      sec: "s",
      statusInit: "Preparing connection…",
      statusConn: "Scan with your wallet.",
      statusNoConfig: "Sign-in is temporarily unavailable. Set KARMAPAY_WC_PROJECT_ID in wc-config.js (WalletConnect Cloud).",
      mnemonicError: "Invalid phrase. Check words and order.",
    };

    let client;
    let activeSession;
    let activeAccount = "";
    let activeSignature = "";
    let countdownTimer;
    let secondsLeft = 60;
    let pairingGeneration = 0;

    function getWalletConnectProjectId() {
      const fromWindow =
        typeof window.KARMAPAY_WC_PROJECT_ID === "string" ? window.KARMAPAY_WC_PROJECT_ID.trim() : "";
      if (fromWindow) return fromWindow;
      return (localStorage.getItem("karma_wc_project_id") || "").trim();
    }

    function setStatus(msg) {
      document.getElementById("status-line").textContent = msg || "";
    }

    function setTimerText() {
      document.getElementById("timer-line").textContent =
        L.qrExpires + " " + secondsLeft + " " + L.sec;
    }

    function walletAddressFromAccount(account) {
      return account.split(":")[2] || "";
    }

    function chainFromAccount(account) {
      const parts = account.split(":");
      return parts.length >= 2 ? parts[0] + ":" + parts[1] : "";
    }

    function getTargetPath() {
      const target = new URLSearchParams(location.search).get("target");
      return target || "studio/index.html";
    }

    function renderQr(uri) {
      const qrBox = document.getElementById("qr-box");
      qrBox.innerHTML = "";
      new QRCode(qrBox, {
        text: uri,
        width: 260,
        height: 260,
        correctLevel: QRCode.CorrectLevel.M,
      });
    }

    async function initClient() {
      const projectId = getWalletConnectProjectId();
      if (!projectId) {
        setStatus(L.statusNoConfig);
        return null;
      }
      localStorage.setItem("karma_wc_project_id", projectId);
      return SignClient.init({
        projectId,
        metadata: {
          name: "KarmaPay",
          description: "Sign in",
          url: location.origin || "https://www.karmapay.cloud",
          icons: [new URL("favicon.svg", location.href).href],
        },
      });
    }

    async function startOrRotatePairing() {
      if (activeAccount) return;
      if (!getWalletConnectProjectId()) {
        setStatus(L.statusNoConfig);
        return;
      }
      const gen = ++pairingGeneration;
      setStatus(L.statusInit);
      client = await initClient();
      if (!client) return;
      setStatus(L.statusConn);
      try {
        const { uri, approval } = await client.connect({
          requiredNamespaces: {
            eip155: {
              methods: ["personal_sign", "eth_chainId"],
              chains: [REQUIRED_CHAIN],
              events: ["accountsChanged", "chainChanged"],
            },
          },
        });
        if (gen !== pairingGeneration) return;
        if (uri) {
          renderQr(uri);
          localStorage.setItem("karma_web3_last_wc_uri", uri);
          startCountdown();
        }
        const approvalRace = approval().then(function (session) {
          if (gen !== pairingGeneration) return null;
          return session;
        });
        const timeoutRace = new Promise(function (_, rej) {
          setTimeout(function () {
            rej(new Error("qr_timeout"));
          }, 60000);
        });
        let session;
        try {
          session = await Promise.race([approvalRace, timeoutRace]);
        } catch (e) {
          if (e && e.message === "qr_timeout" && !activeAccount) {
            document.getElementById("qr-box").innerHTML = "";
            client = undefined;
            await startOrRotatePairing();
          }
          return;
        }
        if (!session || gen !== pairingGeneration) return;
        activeSession = session;
        const account = session.namespaces?.eip155?.accounts?.[0] || "";
        const wallet = walletAddressFromAccount(account);
        const chain = chainFromAccount(account);
        if (!wallet) {
          setStatus("Connected but no address.");
          return;
        }
        if (chain !== REQUIRED_CHAIN) {
          setStatus("Wrong chain: " + chain);
          return;
        }
        activeAccount = wallet;
        clearInterval(countdownTimer);
        const challenge =
          "KarmaPay login challenge\nTime: " + new Date().toISOString() + "\nOrigin: " + location.origin;
        const response = await client.request({
          topic: session.topic,
          chainId: REQUIRED_CHAIN,
          request: {
            method: "personal_sign",
            params: [challenge, activeAccount],
          },
        });
        activeSignature = String(response || "");
        persistSessionAndGo();
      } catch (err) {
        if (gen !== pairingGeneration) return;
        setStatus(err && err.message ? err.message : "Connection error");
      }
    }

    function persistSessionAndGo() {
      const payload = {
        wallet: activeAccount,
        loginMethod: "walletconnect-v2-qr",
        loginAt: new Date().toISOString(),
        chainId: REQUIRED_CHAIN,
        signature: activeSignature,
        challenge: "KarmaPay login challenge",
        wcTopic: activeSession?.topic || "",
      };
      localStorage.setItem("karma_web3_session", JSON.stringify(payload));
      const target = getTargetPath();
      const suffix =
        "wallet=" +
        encodeURIComponent(activeAccount) +
        "&chain=" +
        encodeURIComponent(REQUIRED_CHAIN);
      location.href = target + (target.includes("?") ? "&" : "?") + suffix;
    }

    function startCountdown() {
      secondsLeft = 60;
      setTimerText();
      clearInterval(countdownTimer);
      countdownTimer = setInterval(function () {
        secondsLeft -= 1;
        if (secondsLeft <= 0) {
          clearInterval(countdownTimer);
          return;
        }
        setTimerText();
      }, 1000);
    }

    const grid = document.getElementById("word-grid");
    for (let i = 1; i <= 12; i++) {
      const inp = document.createElement("input");
      inp.type = "text";
      inp.autocomplete = "off";
      inp.placeholder = "Word " + i;
      grid.appendChild(inp);
    }

    document.getElementById("mnemonic-toggle").addEventListener("click", function () {
      const panel = document.getElementById("mnemonic-panel");
      panel.hidden = !panel.hidden;
    });

    document.getElementById("mnemonic-submit").addEventListener("click", function () {
      const words = [];
      grid.querySelectorAll("input").forEach(function (el) {
        words.push((el.value || "").trim().toLowerCase());
      });
      if (words.some(function (w) {
        return !w;
      })) {
        setStatus("Enter all 12 words.");
        return;
      }
      try {
        const phrase = words.join(" ");
        const w = ethers.Wallet.fromPhrase(phrase);
        activeAccount = w.address;
        activeSignature = "0xmnemonic_" + w.address.slice(2, 12);
        const payload = {
          wallet: activeAccount,
          loginMethod: "mnemonic-login",
          loginAt: new Date().toISOString(),
          chainId: REQUIRED_CHAIN,
          signature: activeSignature,
          challenge: "mnemonic-login",
          wcTopic: "",
        };
        localStorage.setItem("karma_web3_session", JSON.stringify(payload));
        location.href =
          getTargetPath() +
          (getTargetPath().includes("?") ? "&" : "?") +
          "wallet=" +
          encodeURIComponent(activeAccount);
      } catch (e) {
        setStatus(L.mnemonicError);
      }
    });

    startCountdown();
    setTimerText();
    if (getWalletConnectProjectId()) {
      setStatus(L.statusConn);
      startOrRotatePairing();
    } else {
      setStatus(L.statusNoConfig);
      document.getElementById("qr-box").innerHTML = "";
    }
  </script>
</body>
</html>
