<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Protected Service</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">← Back</a>
      <h1>Create Protected Service</h1>
    </header>

    <main class="container">
      <section class="card">
        <form id="serviceForm" class="grid-form">
          <label>service_name <input required name="service_name" /></label>
          <label>service_type <input required name="service_type" placeholder="ai-agent-api" /></label>
          <label class="full">description <textarea required name="description"></textarea></label>
          <label>price <input required name="price" type="number" min="1" /></label>
          <label>currency <input required name="currency" value="USDC" /></label>
          <label>delivery_time <input required name="delivery_time" placeholder="24h" /></label>
          <label class="full">refund_policy <textarea required name="refund_policy"></textarea></label>
          <label>seller_wallet <input required name="seller_wallet" placeholder="0x..." /></label>
          <label>seller_bond_rate <input required name="seller_bond_rate" type="number" min="0" max="100" value="30" /></label>
          <button type="submit" class="button full">Create Service</button>
        </form>
      </section>

      <section class="card">
        <h2>Created Service</h2>
        <pre id="result">No service created yet.</pre>
        <div id="linkWrap"></div>
      </section>
    </main>

    <script type="module">
      import { createService } from "./store.js";
      const form = document.getElementById("serviceForm");
      const result = document.getElementById("result");
      const linkWrap = document.getElementById("linkWrap");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const payload = Object.fromEntries(fd.entries());
        payload.price = Number(payload.price);
        payload.seller_bond_rate = Number(payload.seller_bond_rate || 30);
        const service = createService(payload);
        result.textContent = JSON.stringify(service, null, 2);
        linkWrap.innerHTML = `
          <p><strong>payment_link</strong>: <code>${service.payment_link}</code></p>
          <p><a class="button" href="./pay.html?service_id=${service.service_id}">Open Payment Page</a></p>
        `;
      });
    </script>
  </body>
</html>
