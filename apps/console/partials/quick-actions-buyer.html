<!-- Copy into <section class="panel" data-console-actions> on buyer pages. -->
<h2 style="font-size: 1rem; margin-bottom: 0.35rem">Quick actions · live API</h2>
<p class="sub" style="margin: 0 0 0.65rem">
  Uses <code>X-Karma-Api-Key</code> against <code>/v1/capacity</code> and <code>/v1/settlement</code>. Click a task row to select it.
</p>
<div class="grid cols-2">
  <label
    >Active task<br /><select data-action-task-select style="width: 100%; margin-top: 0.25rem"></select
  ></label>
  <label
    >Worker (for lock)<br /><input data-action-worker type="text" placeholder="seller-agent-id" style="width: 100%; margin-top: 0.25rem"
  /></label>
  <label
    >Amount (USDC)<br /><input data-action-amount type="number" step="0.01" value="10" style="width: 100%; margin-top: 0.25rem"
  /></label>
  <label
    >Reason<br /><input data-action-reason type="text" placeholder="dispute / regret" style="width: 100%; margin-top: 0.25rem"
  /></label>
</div>
<p class="btn-row" style="margin-top: 0.65rem; display: flex; flex-wrap: wrap; gap: 0.5rem">
  <button type="button" class="btn" data-console-action="capacity-lock">Lock USDC (ledger)</button>
  <button type="button" class="btn" data-console-action="capacity-release">Release unused</button>
  <button type="button" class="btn" data-console-action="settlement-pending">Settlement pending</button>
  <button type="button" class="btn" data-console-action="settlement-lock">Assign worker &amp; lock</button>
  <button type="button" class="btn" data-console-action="settlement-buyer-accept">Approve settlement</button>
  <button type="button" class="btn" data-console-action="settlement-dispute">Open dispute</button>
  <button type="button" class="btn" data-console-action="view-evidence">View evidence</button>
  <button type="button" class="btn" data-console-action="navigate-trade">付款码 / 交易</button>
</p>
<pre class="out" data-console-action-out style="margin-top: 0.75rem; max-height: 220px; overflow: auto">—</pre>
