<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evidence · KARMA Console</title>
    <link rel="stylesheet" href="../../styles/console.css" />
  </head>
  <body>
    <header class="top">
      <div class="brand">KARMA · Console</div>
      <nav>
        <a href="../../index.html">Overview</a>
        <a href="../receiving/index.html">Receiving</a>
        <a href="../payments/index.html">Payments</a>
        <a href="../agents/index.html">Agents</a>
        <a class="active" href="index.html">Evidence</a>
        <a href="../disputes/index.html">Disputes</a>
        <a href="../settings/index.html">Settings</a>
      </nav>
    </header>
    <main>
      <h1>Evidence Records</h1>
      <p class="sub">
        Bundles per task via <code>GET /v1/bundles/task/{task_id}</code>. Schema: <code>packages/evidence-schema/evidence.schema.json</code>.
      </p>
      <section class="panel" data-karma-console-root data-console-actions data-sync-interval-ms="12000">
        <div class="grid cols-2">
          <label
            >API base<br /><input data-cfg="api_base" type="text" style="width: 100%; margin-top: 0.25rem"
          /></label>
          <label
            >API key<br /><input data-cfg="api_key" type="password" autocomplete="off" style="width: 100%; margin-top: 0.25rem"
          /></label>
          <label style="grid-column: 1 / -1"
            >Task IDs<br /><input data-cfg="task_ids" type="text" style="width: 100%; margin-top: 0.25rem"
          /></label>
        </div>
        <p style="margin-top: 0.65rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center">
          <button type="button" class="btn" data-action="karma-save-cfg">Save + sync</button>
          <button type="button" class="btn" data-action="karma-refresh-now">Refresh</button>
          <label class="sub" style="display: flex; align-items: center; gap: 0.35rem"
            ><input type="checkbox" data-cfg="auto_sync" /> Auto-sync</label
          >
        </p>
        <table style="margin-top: 0.75rem">
          <thead>
            <tr>
              <th>Task</th>
              <th>Bundle ID</th>
              <th>Final result hash (prefix)</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody data-sync-table="evidence"></tbody>
        </table>
        <p style="margin-top: 0.65rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: flex-end">
          <label
            >Active task<br /><select data-action-task-select style="min-width: 14rem; margin-top: 0.25rem"></select
          ></label>
          <button type="button" class="btn" data-console-action="view-evidence">View bundle</button>
          <button type="button" class="btn" data-console-action="copy-bundle-hash">Copy hash</button>
          <button type="button" class="btn" data-console-action="export-bundle-json">Export JSON</button>
          <button type="button" class="btn" data-console-action="view-transitions">Settlement log</button>
        </p>
        <pre class="out" data-console-action-out style="margin-top: 0.75rem; max-height: 240px; overflow: auto">—</pre>
      </section>
    </main>
    <script>
      window.KARMA_API_BASE = window.KARMA_API_BASE || "";
      window.KARMA_API_KEY = window.KARMA_API_KEY || "";
    </script>
    <script src="../../scripts/config.js" onerror="void 0"></script>
    <script src="../../scripts/console-bootstrap.js"></script>
    <script src="../../scripts/karma-public-api.js"></script>
    <script src="../../scripts/console-sync.js"></script>
    <script src="../../scripts/console-actions.js"></script>
  </body>
</html>
