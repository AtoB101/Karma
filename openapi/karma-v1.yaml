openapi: 3.1.0
info:
  title: Karma Ecosystem API
  version: 1.0.0
  summary: Payment intent, evidence verification, and risk alert APIs.
servers:
  - url: http://127.0.0.1:8811
security:
  - bearerAuth: []
paths:
  /v1/health:
    get:
      summary: Health probe
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: ok
                  version:
                    type: string
                required: [status, version]
  /v1/payment-intents:
    post:
      summary: Create payment intent
      operationId: createPaymentIntent
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
            minLength: 8
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentIntentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/payment-intents/{intentId}:
    get:
      summary: Get payment intent
      operationId: getPaymentIntent
      parameters:
        - in: path
          name: intentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment intent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/evidence/{evidenceId}:
    get:
      summary: Get evidence by ID
      operationId: getEvidence
      parameters:
        - in: path
          name: evidenceId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evidence payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/evidence/{evidenceId}/verify:
    post:
      summary: Verify evidence digest and schema marker
      operationId: verifyEvidence
      parameters:
        - in: path
          name: evidenceId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEvidenceRequest'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEvidenceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/risk/alerts:
    get:
      summary: List risk alerts
      operationId: listRiskAlerts
      parameters:
        - in: query
          name: since
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: severity
          required: false
          schema:
            type: string
            enum: [warning, medium, high, critical]
      responses:
        '200':
          description: Risk alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: '#/components/schemas/RiskAlert'
                required: [alerts]
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/capacity/{identityId}:
    get:
      summary: Get identity capacity ledger
      operationId: getCapacity
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Capacity snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapacityState'
  /v1/capacity/{identityId}/lock:
    post:
      summary: Lock USDC and mint 1:1 bill credits
      operationId: lockCapacity
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmountRequest'
      responses:
        '200':
          description: Updated capacity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapacityState'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/capacity/{identityId}/release:
    post:
      summary: Release unused available credits
      operationId: releaseCapacity
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmountRequest'
      responses:
        '200':
          description: Updated capacity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapacityState'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/vouchers:
    post:
      summary: Create authorization voucher
      operationId: createVoucher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVoucherRequest'
      responses:
        '201':
          description: Voucher created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationVoucher'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/vouchers/{voucherId}:
    get:
      summary: Get voucher by ID
      operationId: getVoucher
      parameters:
        - in: path
          name: voucherId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Voucher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationVoucher'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/vouchers/{voucherId}/verify:
    post:
      summary: Verify voucher validity and startability
      operationId: verifyVoucher
      parameters:
        - in: path
          name: voucherId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyVoucherRequest'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoucherVerificationResult'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/vouchers/{voucherId}/accept:
    post:
      summary: Seller accepts voucher and reserves credits
      operationId: acceptVoucher
      parameters:
        - in: path
          name: voucherId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptVoucherRequest'
      responses:
        '200':
          description: Accepted voucher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationVoucher'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/identities/{identityId}/profile/init:
    post:
      summary: Initialize identity profile
      operationId: initIdentityProfile
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Identity profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProfile'
  /v1/identities/{identityId}/profile:
    get:
      summary: Get identity profile
      operationId: getIdentityProfile
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Identity profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProfile'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/identities/{identityId}/rotate-display-id:
    post:
      summary: Rotate identity display ID
      operationId: rotateDisplayId
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Identity profile with new display ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProfile'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/identities/{identityId}/sub-identities:
    post:
      summary: Create sub-identity
      operationId: createSubIdentity
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubIdentityRequest'
      responses:
        '201':
          description: Sub-identity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubIdentity'
        '409':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: List sub-identities
      operationId: listSubIdentities
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sub-identity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubIdentity'
  /v1/identities/{identityId}/sub-identities/{subIdentityId}:
    delete:
      summary: Delete sub-identity
      operationId: deleteSubIdentity
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
        - in: path
          name: subIdentityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sub-identity updated to deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubIdentity'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/progress:
    post:
      summary: Submit progress receipt
      operationId: submitProgressReceipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgressReceipt'
      responses:
        '201':
          description: Progress receipt submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressReceipt'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/progress/{progressReceiptId}/confirm:
    post:
      summary: Confirm progress receipt
      operationId: confirmProgressReceipt
      parameters:
        - in: path
          name: progressReceiptId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Confirmed progress receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressReceipt'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/progress/task/{taskId}:
    get:
      summary: List progress receipts for task
      operationId: listProgressReceipts
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Progress receipts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgressReceipt'
  /v1/settlement/{taskId}/partial:
    post:
      summary: Partial settlement by value percent
      operationId: partialSettlement
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartialSettlementRequest'
      responses:
        '200':
          description: Updated settlement state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/settlement/{taskId}/regret:
    post:
      summary: Buyer regret settlement
      operationId: regretSettlement
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegretRequest'
      responses:
        '200':
          description: Updated settlement state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/settlement/{taskId}/dispute:
    post:
      summary: Open dispute for settlement task
      operationId: openDispute
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputeRequest'
      responses:
        '200':
          description: Updated settlement state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/settlement/{taskId}/auto-arbitrate:
    post:
      summary: Run automatic arbitration rules
      operationId: autoArbitrate
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated settlement state after automatic arbitration
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/arbitration/pool/join:
    post:
      summary: Join or update arbitration pool membership
      operationId: joinArbitrationPool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinArbitrationPoolRequest'
      responses:
        '200':
          description: Arbitration pool member snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationPoolMember'
  /v1/arbitration/pool:
    get:
      summary: List arbitration pool members
      operationId: listArbitrationPool
      responses:
        '200':
          description: Arbitration pool list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArbitrationPoolMember'
  /v1/arbitration/cases:
    post:
      summary: Create arbitration case
      operationId: createArbitrationCase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateArbitrationCaseRequest'
      responses:
        '201':
          description: Arbitration case created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCase'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/arbitration/cases/{caseId}:
    get:
      summary: Get arbitration case
      operationId: getArbitrationCase
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Arbitration case
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCase'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/arbitration/cases/{caseId}/assign-auto:
    post:
      summary: Auto assign arbitrators from active pool
      operationId: assignArbitrators
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignArbitratorsRequest'
      responses:
        '200':
          description: Assigned arbitrators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArbitrationAssignment'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/arbitration/cases/{caseId}/assignments:
    get:
      summary: List case assignments
      operationId: listArbitrationAssignments
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Case assignment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArbitrationAssignment'
  /v1/arbitration/cases/{caseId}/events:
    get:
      summary: List arbitration case events timeline
      operationId: listArbitrationCaseEvents
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 200
      responses:
        '200':
          description: Arbitration case event timeline
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArbitrationCaseEvent'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/arbitration/cases/{caseId}/materials:
    post:
      summary: Submit arbitration material package
      operationId: submitArbitrationMaterial
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitArbitrationMaterialRequest'
      responses:
        '201':
          description: Material package created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationMaterialPackage'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: List arbitration material packages
      operationId: listArbitrationMaterials
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Arbitration materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArbitrationMaterialPackage'
  /v1/arbitration/cases/{caseId}/vote:
    post:
      summary: Cast arbitration vote
      operationId: castArbitrationVote
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CastArbitrationVoteRequest'
      responses:
        '200':
          description: Updated arbitration case
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCase'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/arbitration/cases/{caseId}/execute:
    post:
      summary: Execute decided arbitration case into settlement result
      operationId: executeArbitrationCase
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated settlement state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/responsibility/edges:
    post:
      summary: Ingest responsibility graph edge and detect risk signals
      operationId: ingestResponsibilityEdge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestResponsibilityEdgeRequest'
      responses:
        '201':
          description: Edge ingest result with detected signals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsibilityEdgeIngestResult'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/responsibility/identity/{identityId}/signals:
    get:
      summary: List responsibility risk signals for identity
      operationId: listResponsibilitySignals
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Responsibility risk signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResponsibilityRiskSignal'
  /v1/responsibility/identity/{identityId}/path-features:
    get:
      summary: Get multi-hop responsibility path feature summary
      operationId: getResponsibilityPathFeatures
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
        - in: query
          name: window_hours
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
        - in: query
          name: max_hops
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 12
            default: 4
      responses:
        '200':
          description: Responsibility path feature summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsibilityPathFeaturesSummary'
  /v1/responsibility/identity/{identityId}/score:
    get:
      summary: Get windowed responsibility risk score for identity
      operationId: getResponsibilityScore
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
        - in: query
          name: window_hours
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
      responses:
        '200':
          description: Responsibility risk score summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsibilityScoreSummary'
  /v1/responsibility/task/{taskId}/path-hash:
    get:
      summary: Get task responsibility path hash summary
      operationId: getTaskPathHash
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Path hash summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskPathHashSummary'
  /v1/responsibility/task/{taskId}/temporal-consistency:
    get:
      summary: Get task responsibility temporal consistency report
      operationId: getTaskTemporalConsistency
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Temporal consistency report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskTemporalConsistencyReport'
  /v1/responsibility/model/public-risk:
    get:
      summary: Get public responsibility risk model baseline
      operationId: getPublicResponsibilityRiskModel
      responses:
        '200':
          description: Public baseline model metadata and weights
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsibilityPublicRiskModel'
  /v1/responsibility/scan-runs:
    post:
      summary: Create responsibility batch scan run
      operationId: createResponsibilityBatchScan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResponsibilityBatchScanRunRequest'
      responses:
        '201':
          description: Batch scan result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsibilityBatchScanResult'
  /v1/responsibility/scan-runs/claim:
    post:
      summary: Claim next responsibility scan run for worker
      operationId: claimResponsibilityBatchScan
      requestBody:
        required: true
        content:
