openapi: 3.1.0
info:
  title: Karma Ecosystem API
  version: 1.0.0
  summary: Payment intent, evidence verification, and risk alert APIs.
servers:
  - url: http://127.0.0.1:8811
security:
  - bearerAuth: []
paths:
  /v1/health:
    get:
      summary: Health probe
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: ok
                  version:
                    type: string
                required: [status, version]
  /v1/payment-intents:
    post:
      summary: Create payment intent
      operationId: createPaymentIntent
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
            minLength: 8
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentIntentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/payment-intents/{intentId}:
    get:
      summary: Get payment intent
      operationId: getPaymentIntent
      parameters:
        - in: path
          name: intentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment intent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/evidence/{evidenceId}:
    get:
      summary: Get evidence by ID
      operationId: getEvidence
      parameters:
        - in: path
          name: evidenceId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evidence payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/evidence/{evidenceId}/verify:
    post:
      summary: Verify evidence digest and schema marker
      operationId: verifyEvidence
      parameters:
        - in: path
          name: evidenceId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEvidenceRequest'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEvidenceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/risk/alerts:
    get:
      summary: List risk alerts
      operationId: listRiskAlerts
      parameters:
        - in: query
          name: since
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: severity
          required: false
          schema:
            type: string
            enum: [warning, medium, high, critical]
      responses:
        '200':
          description: Risk alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: '#/components/schemas/RiskAlert'
                required: [alerts]
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/capacity/{identityId}:
    get:
      summary: Get identity capacity ledger
      operationId: getCapacity
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Capacity snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapacityState'
  /v1/capacity/{identityId}/lock:
    post:
      summary: Lock USDC and mint 1:1 bill credits
      operationId: lockCapacity
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmountRequest'
      responses:
        '200':
          description: Updated capacity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapacityState'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/capacity/{identityId}/release:
    post:
      summary: Release unused available credits
      operationId: releaseCapacity
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmountRequest'
      responses:
        '200':
          description: Updated capacity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapacityState'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/vouchers:
    post:
      summary: Create authorization voucher
      operationId: createVoucher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVoucherRequest'
      responses:
        '201':
          description: Voucher created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationVoucher'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/vouchers/{voucherId}:
    get:
      summary: Get voucher by ID
      operationId: getVoucher
      parameters:
        - in: path
          name: voucherId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Voucher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationVoucher'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/vouchers/{voucherId}/verify:
    post:
      summary: Verify voucher validity and startability
      operationId: verifyVoucher
      parameters:
        - in: path
          name: voucherId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyVoucherRequest'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoucherVerificationResult'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/vouchers/{voucherId}/accept:
    post:
      summary: Seller accepts voucher and reserves credits
      operationId: acceptVoucher
      parameters:
        - in: path
          name: voucherId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptVoucherRequest'
      responses:
        '200':
          description: Accepted voucher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationVoucher'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/identities/{identityId}/profile/init:
    post:
      summary: Initialize identity profile
      operationId: initIdentityProfile
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Identity profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProfile'
  /v1/identities/{identityId}/profile:
    get:
      summary: Get identity profile
      operationId: getIdentityProfile
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Identity profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProfile'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/identities/{identityId}/rotate-display-id:
    post:
      summary: Rotate identity display ID
      operationId: rotateDisplayId
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Identity profile with new display ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProfile'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/identities/{identityId}/sub-identities:
    post:
      summary: Create sub-identity
      operationId: createSubIdentity
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubIdentityRequest'
      responses:
        '201':
          description: Sub-identity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubIdentity'
        '409':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: List sub-identities
      operationId: listSubIdentities
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sub-identity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubIdentity'
  /v1/identities/{identityId}/sub-identities/{subIdentityId}:
    delete:
      summary: Delete sub-identity
      operationId: deleteSubIdentity
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
        - in: path
          name: subIdentityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sub-identity updated to deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubIdentity'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/progress:
    post:
      summary: Submit progress receipt
      operationId: submitProgressReceipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgressReceipt'
      responses:
        '201':
          description: Progress receipt submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressReceipt'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/progress/{progressReceiptId}/confirm:
    post:
      summary: Confirm progress receipt
      operationId: confirmProgressReceipt
      parameters:
        - in: path
          name: progressReceiptId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Confirmed progress receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressReceipt'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/progress/task/{taskId}:
    get:
      summary: List progress receipts for task
      operationId: listProgressReceipts
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Progress receipts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgressReceipt'
  /v1/settlement/{taskId}/partial:
    post:
      summary: Partial settlement by value percent
      operationId: partialSettlement
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartialSettlementRequest'
      responses:
        '200':
          description: Updated settlement state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/settlement/{taskId}/regret:
    post:
      summary: Buyer regret settlement
      operationId: regretSettlement
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegretRequest'
      responses:
        '200':
          description: Updated settlement state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/settlement/{taskId}/dispute:
    post:
      summary: Open dispute for settlement task
      operationId: openDispute
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputeRequest'
      responses:
        '200':
          description: Updated settlement state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/settlement/{taskId}/auto-arbitrate:
    post:
      summary: Run automatic arbitration rules
      operationId: autoArbitrate
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated settlement state after automatic arbitration
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/arbitration/pool/join:
    post:
      summary: Join or update arbitration pool membership
      operationId: joinArbitrationPool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinArbitrationPoolRequest'
      responses:
        '200':
          description: Arbitration pool member snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationPoolMember'
  /v1/arbitration/pool:
    get:
      summary: List arbitration pool members
      operationId: listArbitrationPool
      responses:
        '200':
          description: Arbitration pool list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArbitrationPoolMember'
  /v1/arbitration/cases:
    post:
      summary: Create arbitration case
      operationId: createArbitrationCase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateArbitrationCaseRequest'
      responses:
        '201':
          description: Arbitration case created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCase'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/arbitration/cases/{caseId}:
    get:
      summary: Get arbitration case
      operationId: getArbitrationCase
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Arbitration case
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCase'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/arbitration/cases/{caseId}/assign-auto:
    post:
      summary: Auto assign arbitrators from active pool
      operationId: assignArbitrators
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignArbitratorsRequest'
      responses:
        '200':
          description: Assigned arbitrators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArbitrationAssignment'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/arbitration/cases/{caseId}/assignments:
    get:
      summary: List case assignments
      operationId: listArbitrationAssignments
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Case assignment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArbitrationAssignment'
  /v1/arbitration/cases/{caseId}/materials:
    post:
      summary: Submit arbitration material package
      operationId: submitArbitrationMaterial
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitArbitrationMaterialRequest'
      responses:
        '201':
          description: Material package created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationMaterialPackage'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: List arbitration material packages
      operationId: listArbitrationMaterials
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Arbitration materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArbitrationMaterialPackage'
  /v1/arbitration/cases/{caseId}/vote:
    post:
      summary: Cast arbitration vote
      operationId: castArbitrationVote
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CastArbitrationVoteRequest'
      responses:
        '200':
          description: Updated arbitration case
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCase'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
  /v1/arbitration/cases/{caseId}/execute:
    post:
      summary: Execute decided arbitration case into settlement result
      operationId: executeArbitrationCase
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated settlement state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/BadRequest'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreatePaymentIntentRequest:
      type: object
      properties:
        merchantRef:
          type: string
        payer:
          type: string
        payee:
          type: string
        token:
          type: string
        amount:
          type: string
          pattern: '^[0-9]+$'
        chainId:
          type: integer
        policyId:
          type: string
        expiresAt:
          type: string
          format: date-time
      required: [merchantRef, payer, payee, token, amount, chainId, policyId, expiresAt]
    PaymentIntent:
      type: object
      properties:
        intentId:
          type: string
        merchantRef:
          type: string
        status:
          type: string
          enum: [created, authorized, settled, cancelled, expired]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        payer:
          type: string
        payee:
          type: string
        token:
          type: string
        amount:
          type: string
        chainId:
          type: integer
        policyId:
          type: string
        expiresAt:
          type: string
          format: date-time
      required: [intentId, merchantRef, status, createdAt, updatedAt, payer, payee, token, amount, chainId, policyId, expiresAt]
    AmountRequest:
      type: object
      properties:
        amount:
          type: number
          exclusiveMinimum: 0
      required: [amount]
    CapacityState:
      type: object
      properties:
        identity_id:
          type: string
        total_locked_usdc:
          type: number
        total_bill_credits:
          type: number
        available_credits:
          type: number
        reserved_credits:
          type: number
        in_progress_credits:
          type: number
        confirmed_progress_credits:
          type: number
        disputed_credits:
          type: number
        pending_settlement_credits:
          type: number
        burned_credits:
          type: number
        released_credits:
          type: number
        updated_at:
          type: string
          format: date-time
      required:
        - identity_id
        - total_locked_usdc
        - total_bill_credits
        - available_credits
        - reserved_credits
        - in_progress_credits
        - confirmed_progress_credits
        - disputed_credits
        - pending_settlement_credits
        - burned_credits
        - released_credits
        - updated_at
    CreateVoucherRequest:
      type: object
      properties:
        buyer_identity_id:
          type: string
        seller_identity_id:
          type: string
        amount:
          type: number
          exclusiveMinimum: 0
        currency:
          type: string
          default: USDC
        bill_credit_amount:
          type: number
          exclusiveMinimum: 0
        task_type:
          type: string
        task_description_hash:
          type: string
        progress_rule_hash:
          type: string
        evidence_requirement_hash:
          type: string
        expiry_time:
          type: string
          format: date-time
        nonce:
          type: string
        buyer_signature:
          type: string
        buyer_sub_identity_id:
          type: string
        seller_sub_identity_id:
          type: string
      required:
        - buyer_identity_id
        - seller_identity_id
        - amount
        - bill_credit_amount
        - task_type
        - task_description_hash
        - progress_rule_hash
        - evidence_requirement_hash
        - expiry_time
        - nonce
        - buyer_signature
    AuthorizationVoucher:
      type: object
      properties:
        voucher_id:
          type: string
        buyer_identity_id:
          type: string
        seller_identity_id:
          type: string
        amount:
          type: number
        currency:
          type: string
        bill_credit_amount:
          type: number
        task_type:
          type: string
        task_description_hash:
          type: string
        progress_rule_hash:
          type: string
        evidence_requirement_hash:
          type: string
        expiry_time:
          type: string
          format: date-time
        nonce:
          type: string
        buyer_signature:
          type: string
        status:
          type: string
          enum: [created, accepted, used, expired, cancelled]
        buyer_sub_identity_id:
          type: string
        seller_sub_identity_id:
          type: string
        accepted_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
      required:
        - voucher_id
        - buyer_identity_id
        - seller_identity_id
        - amount
        - currency
        - bill_credit_amount
        - task_type
        - task_description_hash
        - progress_rule_hash
        - evidence_requirement_hash
        - expiry_time
        - nonce
        - buyer_signature
        - status
        - created_at
    VerifyVoucherRequest:
      type: object
      properties:
        seller_identity_id:
          type: string
        expected_amount:
          type: number
      required: [seller_identity_id]
    AcceptVoucherRequest:
      type: object
      properties:
        seller_identity_id:
          type: string
      required: [seller_identity_id]
    VoucherVerificationResult:
      type: object
      properties:
        voucher_id:
          type: string
        is_authentic:
          type: boolean
        is_expired:
          type: boolean
        is_used:
          type: boolean
        amount_matches:
          type: boolean
        seller_matches:
          type: boolean
        has_sufficient_capacity:
          type: boolean
        can_start:
          type: boolean
        status:
          type: string
          enum: [created, accepted, used, expired, cancelled]
      required:
        - voucher_id
        - is_authentic
        - is_expired
        - is_used
        - amount_matches
        - seller_matches
        - has_sufficient_capacity
        - can_start
        - status
    ProgressReceipt:
      type: object
      properties:
        progress_receipt_id:
          type: string
        task_id:
          type: string
        seller_identity_id:
          type: string
        progress_percent:
          type: number
          minimum: 0
          maximum: 100
        claimed_value_percent:
          type: number
          minimum: 0
          maximum: 100
        evidence_hash:
          type: string
        runtime_log_hash:
          type: string
        timestamp:
          type: string
          format: date-time
        seller_signature:
          type: string
        validation_method:
          type: string
        confirmation_status:
          type: string
          enum: [pending, confirmed, rejected]
        confirmed_at:
          type: string
          format: date-time
      required:
        - progress_receipt_id
        - task_id
        - seller_identity_id
        - progress_percent
        - claimed_value_percent
        - evidence_hash
        - runtime_log_hash
        - timestamp
        - seller_signature
        - validation_method
        - confirmation_status
    PartialSettlementRequest:
      type: object
      properties:
        settled_value_percent:
          type: number
          exclusiveMinimum: 0
          maximum: 100
        reason:
          type: string
      required: [settled_value_percent]
    RegretRequest:
      type: object
      properties:
        buyer_identity_id:
          type: string
        reason:
          type: string
    DisputeRequest:
      type: object
      properties:
        reason:
          type: string
    IdentityProfile:
      type: object
      properties:
        identity_id:
          type: string
        display_id:
          type: string
        legal_identity_status:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - identity_id
        - display_id
        - legal_identity_status
        - status
        - created_at
        - updated_at
    CreateSubIdentityRequest:
      type: object
      properties:
        sub_identity_type:
          type: string
          enum: [buyer, seller, agent, project, temporary_task]
        alias:
          type: string
      required: [sub_identity_type, alias]
    SubIdentity:
      type: object
      properties:
        sub_identity_id:
          type: string
        parent_identity_id:
          type: string
        sub_identity_type:
          type: string
          enum: [buyer, seller, agent, project, temporary_task]
        alias:
          type: string
        status:
          type: string
          enum: [active, deleted]
        created_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
      required:
        - sub_identity_id
        - parent_identity_id
        - sub_identity_type
        - alias
        - status
        - created_at
    JoinArbitrationPoolRequest:
      type: object
      properties:
        arbitrator_identity_id:
          type: string
        stake_amount:
          type: number
          minimum: 0
      required: [arbitrator_identity_id, stake_amount]
    ArbitrationPoolMember:
      type: object
      properties:
        arbitrator_identity_id:
          type: string
        stake_amount:
          type: number
        status:
          type: string
          enum: [active, inactive]
        joined_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [arbitrator_identity_id, stake_amount, status, joined_at, updated_at]
    CreateArbitrationCaseRequest:
      type: object
      properties:
        task_id:
          type: string
        opened_by:
          type: string
        reason:
          type: string
        required_arbitrators:
          type: integer
          minimum: 1
          maximum: 21
      required: [task_id, opened_by, required_arbitrators]
    ArbitrationCase:
      type: object
      properties:
        case_id:
          type: string
        task_id:
          type: string
        settlement_id:
          type: string
        opened_by:
          type: string
        reason:
          type: string
        status:
          type: string
          enum: [open, voting, decided, executed, cancelled]
        required_arbitrators:
          type: integer
        decided_outcome:
          type: string
          enum: [buyer_wins, seller_wins, partial]
        final_partial_percent:
          type: number
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        executed_at:
          type: string
          format: date-time
      required:
        - case_id
        - task_id
        - opened_by
        - status
        - required_arbitrators
        - created_at
        - updated_at
    AssignArbitratorsRequest:
      type: object
      properties:
        count:
          type: integer
          minimum: 1
          maximum: 21
      required: [count]
    ArbitrationAssignment:
      type: object
      properties:
        assignment_id:
          type: string
        case_id:
          type: string
        arbitrator_identity_id:
          type: string
        assigned_at:
          type: string
          format: date-time
        status:
          type: string
      required: [assignment_id, case_id, arbitrator_identity_id, assigned_at, status]
    SubmitArbitrationMaterialRequest:
      type: object
      properties:
        submitted_by:
          type: string
        bundle_id:
          type: string
        progress_receipt_ids:
          type: array
          items:
            type: string
        evidence_hashes:
          type: array
          items:
            type: string
        storage_uri:
          type: string
        format_version:
          type: string
      required: [submitted_by]
    ArbitrationMaterialPackage:
      type: object
      properties:
        material_id:
          type: string
        case_id:
          type: string
        task_id:
          type: string
        submitted_by:
          type: string
        bundle_id:
          type: string
        progress_receipt_ids:
          type: array
          items:
            type: string
        evidence_hashes:
          type: array
          items:
            type: string
        package_hash:
          type: string
        storage_uri:
          type: string
        format_version:
          type: string
        submitted_at:
          type: string
          format: date-time
      required:
        - material_id
        - case_id
        - task_id
        - submitted_by
        - progress_receipt_ids
        - evidence_hashes
        - package_hash
        - format_version
        - submitted_at
    CastArbitrationVoteRequest:
      type: object
      properties:
        arbitrator_identity_id:
          type: string
        decision:
          type: string
          enum: [buyer_wins, seller_wins, partial]
        partial_percent:
          type: number
          minimum: 0
          maximum: 100
        rationale:
          type: string
      required: [arbitrator_identity_id, decision]
    EvidenceObject:
      type: object
      properties:
        evidenceId:
          type: string
        schemaVersion:
          type: string
        evidenceVersion:
          type: string
        digestSha256:
          type: string
        payload:
          type: object
          additionalProperties: true
        caller_authorization_signature:
          type: string
          description: Caller authorization signature presence marker.
        provider_execution_signature:
          type: string
          description: Provider execution signature presence marker.
        request_hash:
          type: string
          description: Hash pointer for the request payload.
        response_hash:
          type: string
          description: Hash pointer for the response payload.
        execution_trace_hash:
          type: string
          description: Optional trace hash pointer (field presence only in public schema).
        dispute_status:
          type: string
          enum: [none, opened, under_review, resolved]
        settlement_status:
          type: string
          enum: [pending, settled, cancelled, disputed]
      required:
        - evidenceId
        - schemaVersion
        - evidenceVersion
        - digestSha256
        - payload
        - caller_authorization_signature
        - provider_execution_signature
        - request_hash
        - response_hash
        - dispute_status
        - settlement_status
    VerifyEvidenceRequest:
      type: object
      properties:
        expectedDigestSha256:
          type: string
        expectedSchemaVersion:
          type: string
      required: [expectedDigestSha256, expectedSchemaVersion]
    VerifyEvidenceResponse:
      type: object
      properties:
        evidenceId:
          type: string
        verified:
          type: boolean
        checks:
          type: object
          properties:
            digestMatch:
              type: boolean
            schemaVersionMatch:
              type: boolean
          required: [digestMatch, schemaVersionMatch]
      required: [evidenceId, verified, checks]
    RiskAlert:
      type: object
      properties:
        id:
          type: string
        createdAt:
          type: string
          format: date-time
        severity:
          type: string
          enum: [warning, medium, high, critical]
        code:
          type: string
        title:
          type: string
        detail:
          type: string
        source:
          type: string
      required: [id, createdAt, severity, code, title, detail, source]
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
          required: [code, message, requestId]
      required: [error]
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
