components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreatePaymentIntentRequest:
      type: object
      properties:
        merchantRef:
          type: string
        payer:
          type: string
        payee:
          type: string
        token:
          type: string
        amount:
          type: string
          pattern: '^[0-9]+$'
        chainId:
          type: integer
        policyId:
          type: string
        expiresAt:
          type: string
          format: date-time
      required: [merchantRef, payer, payee, token, amount, chainId, policyId, expiresAt]
    PaymentIntent:
      type: object
      properties:
        intentId:
          type: string
        merchantRef:
          type: string
        status:
          type: string
          enum: [created, authorized, settled, cancelled, expired]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        payer:
          type: string
        payee:
          type: string
        token:
          type: string
        amount:
          type: string
        chainId:
          type: integer
        policyId:
          type: string
        expiresAt:
          type: string
          format: date-time
      required: [intentId, merchantRef, status, createdAt, updatedAt, payer, payee, token, amount, chainId, policyId, expiresAt]
    AmountRequest:
      type: object
      properties:
        amount:
          type: number
          exclusiveMinimum: 0
      required: [amount]
    CapacityState:
      type: object
      properties:
        identity_id:
          type: string
        total_locked_usdc:
          type: number
        total_bill_credits:
          type: number
        available_credits:
          type: number
        reserved_credits:
          type: number
        in_progress_credits:
          type: number
        confirmed_progress_credits:
          type: number
        disputed_credits:
          type: number
        pending_settlement_credits:
          type: number
        burned_credits:
          type: number
        released_credits:
          type: number
        updated_at:
          type: string
          format: date-time
      required:
        - identity_id
        - total_locked_usdc
        - total_bill_credits
        - available_credits
        - reserved_credits
        - in_progress_credits
        - confirmed_progress_credits
        - disputed_credits
        - pending_settlement_credits
        - burned_credits
        - released_credits
        - updated_at
    CreateVoucherRequest:
      type: object
      properties:
        buyer_identity_id:
          type: string
        seller_identity_id:
          type: string
        amount:
          type: number
          exclusiveMinimum: 0
        currency:
          type: string
          default: USDC
        bill_credit_amount:
          type: number
          exclusiveMinimum: 0
        task_type:
          type: string
        task_description_hash:
          type: string
        progress_rule_hash:
          type: string
        evidence_requirement_hash:
          type: string
        expiry_time:
          type: string
          format: date-time
        nonce:
          type: string
        buyer_signature:
          type: string
        buyer_sub_identity_id:
          type: string
        seller_sub_identity_id:
          type: string
      required:
        - buyer_identity_id
        - seller_identity_id
        - amount
        - bill_credit_amount
        - task_type
        - task_description_hash
        - progress_rule_hash
        - evidence_requirement_hash
        - expiry_time
        - nonce
        - buyer_signature
    AuthorizationVoucher:
      type: object
      properties:
        voucher_id:
          type: string
        buyer_identity_id:
          type: string
        seller_identity_id:
          type: string
        amount:
          type: number
        currency:
          type: string
        bill_credit_amount:
          type: number
        task_type:
          type: string
        task_description_hash:
          type: string
        progress_rule_hash:
          type: string
        evidence_requirement_hash:
          type: string
        expiry_time:
          type: string
          format: date-time
        nonce:
          type: string
        buyer_signature:
          type: string
        status:
          type: string
          enum: [created, accepted, used, expired, cancelled]
        buyer_sub_identity_id:
          type: string
        seller_sub_identity_id:
          type: string
        accepted_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
      required:
        - voucher_id
        - buyer_identity_id
        - seller_identity_id
        - amount
        - currency
        - bill_credit_amount
        - task_type
        - task_description_hash
        - progress_rule_hash
        - evidence_requirement_hash
        - expiry_time
        - nonce
        - buyer_signature
        - status
        - created_at
    VerifyVoucherRequest:
      type: object
      properties:
        seller_identity_id:
          type: string
        expected_amount:
          type: number
      required: [seller_identity_id]
    AcceptVoucherRequest:
      type: object
      properties:
        seller_identity_id:
          type: string
      required: [seller_identity_id]
    VoucherVerificationResult:
      type: object
      properties:
        voucher_id:
          type: string
        is_authentic:
          type: boolean
        is_expired:
          type: boolean
        is_used:
          type: boolean
        amount_matches:
          type: boolean
        seller_matches:
          type: boolean
        has_sufficient_capacity:
          type: boolean
        can_start:
          type: boolean
        status:
          type: string
          enum: [created, accepted, used, expired, cancelled]
      required:
        - voucher_id
        - is_authentic
        - is_expired
        - is_used
        - amount_matches
        - seller_matches
        - has_sufficient_capacity
        - can_start
        - status
    ProgressReceipt:
      type: object
      properties:
        progress_receipt_id:
          type: string
        task_id:
          type: string
        seller_identity_id:
          type: string
        progress_percent:
          type: number
          minimum: 0
          maximum: 100
        claimed_value_percent:
          type: number
          minimum: 0
          maximum: 100
        evidence_hash:
          type: string
        runtime_log_hash:
          type: string
        timestamp:
          type: string
          format: date-time
        seller_signature:
          type: string
        validation_method:
          type: string
        confirmation_status:
          type: string
          enum: [pending, confirmed, rejected]
        confirmed_at:
          type: string
          format: date-time
      required:
        - progress_receipt_id
        - task_id
        - seller_identity_id
        - progress_percent
        - claimed_value_percent
        - evidence_hash
        - runtime_log_hash
        - timestamp
        - seller_signature
        - validation_method
        - confirmation_status
    PartialSettlementRequest:
      type: object
      properties:
        settled_value_percent:
          type: number
          exclusiveMinimum: 0
          maximum: 100
        reason:
          type: string
      required: [settled_value_percent]
    RegretRequest:
      type: object
      properties:
        buyer_identity_id:
          type: string
        reason:
          type: string
    DisputeRequest:
      type: object
      properties:
        reason:
          type: string
    IdentityProfile:
      type: object
      properties:
        identity_id:
          type: string
        display_id:
          type: string
        legal_identity_status:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - identity_id
        - display_id
        - legal_identity_status
        - status
        - created_at
        - updated_at
    CreateSubIdentityRequest:
      type: object
      properties:
        sub_identity_type:
          type: string
          enum: [buyer, seller, agent, project, temporary_task]
        alias:
          type: string
      required: [sub_identity_type, alias]
    SubIdentity:
      type: object
      properties:
        sub_identity_id:
          type: string
        parent_identity_id:
          type: string
        sub_identity_type:
          type: string
          enum: [buyer, seller, agent, project, temporary_task]
        alias:
          type: string
        status:
          type: string
          enum: [active, deleted]
        created_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
      required:
        - sub_identity_id
        - parent_identity_id
        - sub_identity_type
        - alias
        - status
        - created_at
    JoinArbitrationPoolRequest:
      type: object
      properties:
        arbitrator_identity_id:
          type: string
        stake_amount:
          type: number
          minimum: 0
      required: [arbitrator_identity_id, stake_amount]
    ArbitrationPoolMember:
      type: object
      properties:
        arbitrator_identity_id:
          type: string
        stake_amount:
          type: number
        status:
          type: string
          enum: [active, inactive]
        joined_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [arbitrator_identity_id, stake_amount, status, joined_at, updated_at]
    CreateArbitrationCaseRequest:
      type: object
      properties:
        task_id:
          type: string
        opened_by:
          type: string
        reason:
          type: string
        required_arbitrators:
          type: integer
          minimum: 1
          maximum: 21
      required: [task_id, opened_by, required_arbitrators]
    ArbitrationCase:
      type: object
      properties:
        case_id:
          type: string
        task_id:
          type: string
        settlement_id:
          type: string
        opened_by:
          type: string
        reason:
          type: string
        status:
          type: string
          enum: [open, voting, decided, executed, cancelled]
        required_arbitrators:
          type: integer
        decided_outcome:
          type: string
          enum: [buyer_wins, seller_wins, partial]
        final_partial_percent:
          type: number
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        executed_at:
          type: string
          format: date-time
      required:
        - case_id
        - task_id
        - opened_by
        - status
        - required_arbitrators
        - created_at
        - updated_at
    AssignArbitratorsRequest:
      type: object
      properties:
        count:
          type: integer
          minimum: 1
          maximum: 21
      required: [count]
    ArbitrationAssignment:
      type: object
      properties:
        assignment_id:
          type: string
        case_id:
          type: string
        arbitrator_identity_id:
          type: string
        assigned_at:
          type: string
          format: date-time
        status:
          type: string
      required: [assignment_id, case_id, arbitrator_identity_id, assigned_at, status]
    ArbitrationEventType:
      type: string
      enum:
        - case_created
        - arbitrators_assigned
        - material_submitted
        - vote_cast
        - case_decided
        - case_executed
    ArbitrationCaseEvent:
      type: object
      properties:
        event_id:
          type: string
        case_id:
          type: string
        event_type:
          $ref: '#/components/schemas/ArbitrationEventType'
        detail:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
      required:
        - event_id
        - case_id
        - event_type
        - detail
        - metadata
        - created_at
    SubmitArbitrationMaterialRequest:
      type: object
      properties:
        submitted_by:
          type: string
        bundle_id:
          type: string
        progress_receipt_ids:
          type: array
          items:
            type: string
        evidence_hashes:
          type: array
          items:
            type: string
        storage_uri:
          type: string
        format_version:
          type: string
      required: [submitted_by]
    ArbitrationMaterialPackage:
