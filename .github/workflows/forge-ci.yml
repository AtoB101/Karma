name: Forge CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  quick-check:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge install

      - name: Build
        run: forge build

      - name: Run fast unit/integration tests
        run: forge test -vv --no-match-path "**/_legacy/**"

      - name: Gas snapshot (generate)
        run: forge snapshot --no-match-path "**/_legacy/**"

      - name: Run proof/evidence CI gates (M4.1)
        run: ./scripts/ci-proof-gates.sh

      - name: Trust-engine public safety guard
        run: ./scripts/check-trust-engine-public-safety.sh

  full-check:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge install

      - name: Build
        run: forge build

      - name: Run all tests
        run: forge test -vv --no-match-path "**/_legacy/**"

      - name: Gas snapshot (generate)
        run: forge snapshot --no-match-path "**/_legacy/**"

      - name: Run proof/evidence CI gates (M4.1)
        run: ./scripts/ci-proof-gates.sh

      - name: Trust-engine public safety guard
        run: ./scripts/check-trust-engine-public-safety.sh
