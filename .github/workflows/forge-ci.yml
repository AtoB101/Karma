name: Forge CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  quick-check:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Pinned tag avoids foundryup "stable/latest" → api.github.com (unauthenticated 403 under CI egress).
      FOUNDRY_CI_VERSION: v1.7.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # foundry-toolchain can fail on GitHub API 403; fall back to foundryup in next step.
      - name: Setup Foundry
        id: foundry_toolchain
        continue-on-error: true
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_CI_VERSION }}

      - name: Ensure Foundry (fallback if toolchain failed)
        shell: bash
        run: |
          set -euo pipefail
          if command -v forge >/dev/null 2>&1 && command -v cast >/dev/null 2>&1; then
            forge --version
            cast --version
            exit 0
          fi
          curl -L https://foundry.paradigm.xyz | bash
          echo "$HOME/.foundry/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.foundry/bin:$PATH"
          for wait in 0 2 4 8 16; do
            if [[ "$wait" -gt 0 ]]; then sleep "$wait"; fi
            if foundryup -i "${FOUNDRY_CI_VERSION}"; then
              break
            fi
            echo "foundryup -i ${FOUNDRY_CI_VERSION} failed, retrying in ${wait}s..."
          done
          forge --version
          cast --version

      - name: Install dependencies
        run: forge install

      - name: Build
        run: forge build

      - name: Run fast unit/integration tests
        run: forge test -vv

      - name: Run invariant suite (NC)
        run: forge test --match-path "karma-core/contracts/test/NonCustodialAgentPayment.invariant.t.sol" -vv

      - name: Gas snapshot diff (fail on unexpected regression)
        run: forge snapshot --diff

      - name: Run proof/evidence CI gates (M4.1)
        run: ./scripts/ci-proof-gates.sh

      - name: Trust-engine public safety guard
        run: ./scripts/check-trust-engine-public-safety.sh

  full-check:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FOUNDRY_CI_VERSION: v1.7.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # foundry-toolchain can fail on GitHub API 403; fall back to foundryup in next step.
      - name: Setup Foundry
        id: foundry_toolchain
        continue-on-error: true
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_CI_VERSION }}

      - name: Ensure Foundry (fallback if toolchain failed)
        shell: bash
        run: |
          set -euo pipefail
          if command -v forge >/dev/null 2>&1 && command -v cast >/dev/null 2>&1; then
            forge --version
            cast --version
            exit 0
          fi
          curl -L https://foundry.paradigm.xyz | bash
          echo "$HOME/.foundry/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.foundry/bin:$PATH"
          for wait in 0 2 4 8 16; do
            if [[ "$wait" -gt 0 ]]; then sleep "$wait"; fi
            if foundryup -i "${FOUNDRY_CI_VERSION}"; then
              break
            fi
            echo "foundryup -i ${FOUNDRY_CI_VERSION} failed, retrying in ${wait}s..."
          done
          forge --version
          cast --version

      - name: Install dependencies
        run: forge install

      - name: Build
        run: forge build

      - name: Run all tests
        run: forge test -vv

      - name: Run invariant suite (NC)
        run: forge test --match-path "karma-core/contracts/test/NonCustodialAgentPayment.invariant.t.sol" -vv

      - name: Gas snapshot diff
        run: forge snapshot --diff

      - name: Run proof/evidence CI gates (M4.1)
        run: ./scripts/ci-proof-gates.sh

      - name: Trust-engine public safety guard
        run: ./scripts/check-trust-engine-public-safety.sh
