# Python API + Runtime — 全量测试（单元 + 集成 + 信任运行时）
#
# 与 Makefile 中 ``forge test`` 互补：本 Job 运行 ``scripts/run_public_acceptance_tests.sh``
#（``tests/`` + OpenManus/OpenClaw 包测试 + ``karma-final/karma-public`` 镜像隔离 pytest）。
name: Python tests

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project (dev extras)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      - name: Public acceptance gate (tests + packages + karma-public mirror)
        run: |
          set -euo pipefail
          bash scripts/run_public_acceptance_tests.sh -q --tb=short
