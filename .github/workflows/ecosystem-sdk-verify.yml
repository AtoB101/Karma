name: Ecosystem SDK Verify

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  scaffold-verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        framework: [openclaw, openmanus]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Generate ecosystem scaffold via quickstart wrapper
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ecosystem/quickstart.sh \
            --framework "${{ matrix.framework }}" \
            --workspace-dir . \
            --skip-runtime-check \
            --overwrite \
            --no-compose

      - name: Validate generated files
        shell: bash
        run: |
          set -euo pipefail
          test -f .env.karma.example
          test -f karma.ecosystem.json
          test -f scripts/karma-ecosystem-inject-env.sh
          test -f ".github/workflows/karma-ecosystem-verify.template.yml"
          test -f "deploy/karma-ecosystem/docker-compose.${{ matrix.framework }}.yml"
