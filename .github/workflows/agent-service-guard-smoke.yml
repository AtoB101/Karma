name: Agent Service Guard Smoke

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Agent Service Guard smoke tests
        run: npm run test:agent-guard

      - name: Run Python route smoke fallback
        run: python3 scripts/agent-service-guard-smoke.py
