name: Agent Service Guard Smoke

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python (integration packages)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm install

      - name: TypeScript public SDK smoke tests
        run: |
          set -euo pipefail
          cd packages/sdk
          npm install
          npm run test
          npm run build

      - name: Python integration packages (karma-openmanus, karma-openclaw)
        run: |
          set -euo pipefail
          python3 -m pip install -U pip
          python3 -m pip install -e "./packages/karma-openmanus[dev]"
          python3 -m pytest packages/karma-openmanus/tests -q
          python3 -m pip install -e "./packages/karma-openclaw[dev]"
          python3 -m pytest packages/karma-openclaw/tests -q

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Agent Service Guard smoke tests
        run: npm run test:agent-guard

      - name: Run Phase 2 public contract gate
        run: python3 scripts/phase2-public-contract-gate.py

      - name: Agent Guard frontend security gate
        run: python3 scripts/agent-guard-security-gate.py

      - name: Run Python route smoke fallback
        run: python3 scripts/agent-service-guard-smoke.py
