server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location = / {
        try_files /apps/website/index.html =404;
    }

    location ^~ /apps/ {
        try_files $uri $uri/ =404;
    }

    # Optional friendly redirects when hosting at domain root
    location = /console {
        return 302 /apps/console/index.html;
    }

    location = /developers {
        return 302 /apps/developer-portal/index.html;
    }
}
